      {name:'Außenbandruptur OSG',prio:'high',reason:'Supinationstrauma, Druckschmerz Lig. fibulotalare ant., Röntgen normal'},

let activeCat = 'all';
let activeId = null;
let activeDtab = 'fragen';

function filterCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cbt').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderTiles();
}

function filterTiles() {
  renderTiles();
}

function renderTiles() {
  const q = document.getElementById('srch').value.toLowerCase();
  const grid = document.getElementById('tile-grid');
  grid.innerHTML = '';
  DATA.filter(d => (activeCat === 'all' || d.cat === activeCat) && d.name.toLowerCase().includes(q))
    .forEach(d => {
      const t = document.createElement('div');
      t.className = 'tile ' + d.cat;
      t.innerHTML = `<div class="tile-cat">${catLabel(d.cat)}</div><div class="tile-name">${d.name}</div>`;
      t.onclick = () => openDetail(d.id);
      grid.appendChild(t);
    });
}

function catLabel(c) {
  return {gastro:'Gastroenterologie',neuro:'Neurologie',kardio:'Kardiologie',pneumo:'Pneumologie',ortho:'Orthopädie/Unfallchirurgie'}[c] || c;
}

function openDetail(id) {
  activeId = id;
  activeDtab = 'fragen';
  renderDetail();
  document.getElementById('detail-panel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function renderDetail() {
  const d = DATA.find(x => x.id === activeId);
  if (!d) return;
  const panel = document.getElementById('detail-panel');
  panel.className = 'detail open';

  const tabs = ['fragen','dd','arzt','klinik'];
  const tabLabels = {fragen:'Anamnese-Fragen', dd:'Differenzialdiagnosen', arzt:'Arzt-Arzt-Gespräch', klinik:'Klinik & Therapie'};

  let html = `<div class="det-header">
    <div><div class="det-title">${d.name}</div><span class="det-cat ${d.cat}">${catLabel(d.cat)}</span></div>
    <button class="close-btn" onclick="closeDetail()">Schließen</button>
  </div>
  <div class="tabs2">${tabs.map(t=>`<button class="t2${activeDtab===t?' on':''}" onclick="switchTab('${t}')">${tabLabels[t]}</button>`).join('')}</div>`;

  if (activeDtab === 'fragen') {
    html += '<div class="tab-content on">';
    d.fragen.forEach(s => {
      html += `<div class="section-lbl">${s.section}</div><ul class="q-list">`;
      s.qs.forEach(q => { html += `<li>${q}</li>`; });
      html += '</ul>';
    });
    html += '</div>';
  } else if (activeDtab === 'dd') {
    html += '<div class="tab-content on"><div class="legend"><div class="leg-item"><div class="leg-dot" style="background:#E24B4A"></div>Wichtig</div><div class="leg-item"><div class="leg-dot" style="background:#EF9F27"></div>Möglich</div><div class="leg-item"><div class="leg-dot" style="background:#1D9E75"></div>Selten</div></div><ul class="dd-list">';
    d.dd.forEach(dd => {
      html += `<div class="dd-item ${dd.prio}"><div class="dd-name">${dd.name}</div><div class="dd-reason">${dd.reason}</div></div>`;
    });
    html += '</ul>';
    if (d.warn) html += `<div class="warn-box"><strong>Achtung:</strong> ${d.warn}</div>`;
    html += '</div>';
  } else if (activeDtab === 'arzt') {
    html += `<div class="tab-content on">
      <div class="arzt-block"><div class="arzt-label">Musterformulierung Arzt-Arzt-Gespräch</div><div class="arzt-text">${d.arzt}</div></div>
      ${d.warn ? `<div class="warn-box"><strong>Alarmsignal:</strong> ${d.warn}</div>` : ''}
    </div>`;
  } else if (activeDtab === 'klinik') {
    const k = d.klinik;
    html += `<div class="tab-content on"><div class="klinik-grid">
      <div class="klinik-box"><div class="klinik-box-title">Labor</div><ul>${k.labor.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="klinik-box"><div class="klinik-box-title">Bildgebung / Diagnostik</div><ul>${k.bild.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="klinik-box"><div class="klinik-box-title">Klinische Zeichen</div><ul>${k.körper.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="klinik-box"><div class="klinik-box-title">Therapie</div><ul>${k.therapie.map(x=>`<li>${x}</li>`).join('')}</ul></div>
    </div>${d.warn?`<div class="warn-box"><strong>Merke:</strong> ${d.warn}</div>`:''}</div>`;
  }

  panel.innerHTML = html;
}

function switchTab(t) {
  activeDtab = t;
  renderDetail();
}

function closeDetail() {
  document.getElementById('detail-panel').className = 'detail';
  activeId = null;
}

renderTiles();
</script>
